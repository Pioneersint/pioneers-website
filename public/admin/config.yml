backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Create {{collection}} \"{{slug}}\""
    update: "Update {{collection}} \"{{slug}}\""
    delete: "Delete {{collection}} \"{{slug}}\""
    uploadMedia: "Upload \"{{path}}\""
    deleteMedia: "Delete \"{{path}}\""

local_backend: false

media_folder: "public/assets/cms"
public_folder: "/assets/cms"

slug:
  encoding: "unicode"
  clean_accents: false
  sanitize_replacement: "-"

i18n:
  structure: single_file
  locales: [en, ar]
  default_locale: en

collections:
  # ─── SITE SETTINGS ───────────────────────────────────
  - name: "settings"
    label: "⚙️ Site Settings"
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings/general.json"
        i18n: true
        fields:
          - { label: "Site Title", name: "site_title", widget: "string", i18n: true }
          - { label: "Site Description", name: "site_description", widget: "text", i18n: true }
          - { label: "Phone", name: "phone", widget: "string", default: "+962 78 159 5846" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string", default: "+962 78 159 5846" }
          - { label: "Email", name: "email", widget: "string", default: "info@pioneersint.com" }
          - { label: "Address", name: "address", widget: "text", i18n: true }
          - { label: "Facebook", name: "facebook", widget: "string", required: false }
          - { label: "Twitter/X", name: "twitter", widget: "string", required: false }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "YouTube", name: "youtube", widget: "string", required: false }

      - name: "hero"
        label: "Homepage Hero"
        file: "content/settings/hero.json"
        i18n: true
        fields:
          - { label: "Hero Title", name: "title", widget: "string", i18n: true }
          - { label: "Hero Subtitle", name: "subtitle", widget: "text", i18n: true }
          - { label: "CTA Button Text", name: "cta_text", widget: "string", i18n: true, default: "Explore Services" }
          - { label: "Hero Image", name: "image", widget: "image", required: false }
          - { label: "Show Video Background", name: "show_video", widget: "boolean", default: true }

      - name: "stats"
        label: "Homepage Stats"
        file: "content/settings/stats.json"
        fields:
          - name: "stats"
            label: "Statistics"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label (English)", name: "label_en", widget: "string" }
              - { label: "Label (Arabic)", name: "label_ar", widget: "string" }

  # ─── PAGES ───────────────────────────────────────────
  - name: "pages"
    label: "📄 Pages"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Slug", name: "slug", widget: "string", i18n: false }
      - { label: "Meta Description", name: "meta_description", widget: "text", i18n: true }
      - { label: "Content", name: "body", widget: "markdown", i18n: true }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Show in Navigation", name: "show_in_nav", widget: "boolean", default: false }
      - { label: "Navigation Order", name: "nav_order", widget: "number", default: 0, required: false }
      - { label: "Parent Page", name: "parent", widget: "relation", collection: "pages", search_fields: ["title"], value_field: "slug", display_fields: ["title"], required: false }

  # ─── COURSES ─────────────────────────────────────────
  - name: "courses"
    label: "🎓 Courses"
    folder: "content/courses"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Course Title", name: "title", widget: "string", i18n: true }
      - { label: "Slug", name: "slug", widget: "string", i18n: false }
      - { label: "Course Code", name: "code", widget: "string", required: false }
      - { label: "Category", name: "category", widget: "select", options: ["ISO Certification", "ESG & Sustainability", "Healthcare", "Corporate Governance", "Risk Management", "Leadership", "Quality Management", "Safety", "Other"], i18n: false }
      - { label: "Level", name: "level", widget: "select", options: ["Beginner", "Intermediate", "Advanced", "Expert"], i18n: false }
      - { label: "Duration", name: "duration", widget: "string", i18n: true }
      - { label: "Price (USD)", name: "price", widget: "number", value_type: "float", min: 0 }
      - { label: "Currency", name: "currency", widget: "select", options: ["USD", "JOD", "SAR", "AED"], default: "USD" }
      - { label: "Short Description", name: "short_description", widget: "text", i18n: true }
      - { label: "Full Description", name: "body", widget: "markdown", i18n: true }
      - { label: "Learning Objectives", name: "objectives", widget: "list", field: { label: "Objective", name: "objective", widget: "string", i18n: true }, i18n: true }
      - { label: "Target Audience", name: "target_audience", widget: "list", field: { label: "Audience", name: "audience", widget: "string", i18n: true }, i18n: true }
      - { label: "Course Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Instructor Name", name: "instructor", widget: "string", required: false }
      - { label: "Publish Date", name: "date", widget: "datetime", default: "", required: false }

  # ─── BLOG POSTS ──────────────────────────────────────
  - name: "posts"
    label: "📝 Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    i18n: true
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Slug", name: "slug", widget: "string", i18n: false }
      - { label: "Author", name: "author", widget: "string", default: "Pioneers Team" }
      - { label: "Category", name: "category", widget: "select", options: ["Industry News", "ISO Standards", "ESG & Sustainability", "Healthcare", "Corporate Governance", "Training & Development", "Case Studies", "Thought Leadership"], i18n: false }
      - { label: "Tags", name: "tags", widget: "list", field: { name: "tag", label: "Tag", widget: "string" } }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", i18n: true }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }
      - { label: "Published", name: "published", widget: "boolean", default: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Publish Date", name: "date", widget: "datetime" }

  # ─── TESTIMONIALS ────────────────────────────────────
  - name: "testimonials"
    label: "💬 Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    i18n: false
    fields:
      - { label: "Client Name", name: "name", widget: "string" }
      - { label: "Position/Title", name: "position", widget: "string" }
      - { label: "Company", name: "company", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Quote (English)", name: "quote_en", widget: "text" }
      - { label: "Quote (Arabic)", name: "quote_ar", widget: "text", required: false }
      - { label: "Rating", name: "rating", widget: "select", options: [1, 2, 3, 4, 5], default: 5 }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  # ─── TEAM MEMBERS ────────────────────────────────────
  - name: "team"
    label: "👥 Team Members"
    folder: "content/team"
    create: true
    slug: "{{slug}}"
    i18n: false
    fields:
      - { label: "Full Name", name: "name", widget: "string" }
      - { label: "Name (Arabic)", name: "name_ar", widget: "string", required: false }
      - { label: "Position", name: "position", widget: "string" }
      - { label: "Position (Arabic)", name: "position_ar", widget: "string", required: false }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Bio", name: "bio", widget: "markdown" }
      - { label: "Bio (Arabic)", name: "bio_ar", widget: "markdown", required: false }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Department", name: "department", widget: "select", options: ["Leadership", "Consulting", "Training", "Healthcare", "ESG", "IT", "Admin"], default: "Consulting" }
      - { label: "Order", name: "order", widget: "number", default: 0 }

  # ─── CLIENTS / PARTNERS ──────────────────────────────
  - name: "clients"
    label: "🤝 Clients"
    folder: "content/clients"
    create: true
    slug: "{{slug}}"
    i18n: false
    fields:
      - { label: "Company Name", name: "name", widget: "string" }
      - { label: "Logo", name: "logo", widget: "image" }
      - { label: "Website", name: "website", widget: "string", required: false }
      - { label: "Industry", name: "industry", widget: "string", required: false }
      - { label: "Country", name: "country", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: true }

  # ─── FAQ ─────────────────────────────────────────────
  - name: "faq"
    label: "❓ FAQ"
    folder: "content/faq"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Question", name: "question", widget: "string", i18n: true }
      - { label: "Answer", name: "answer", widget: "markdown", i18n: true }
      - { label: "Category", name: "category", widget: "select", options: ["General", "ISO Certification", "ESG", "Healthcare", "Training", "Payment", "Technical"], i18n: false }
      - { label: "Order", name: "order", widget: "number", default: 0 }

  # ─── SERVICES ────────────────────────────────────────
  - name: "services"
    label: "🛠️ Services"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Service Title", name: "title", widget: "string", i18n: true }
      - { label: "Slug", name: "slug", widget: "string", i18n: false }
      - { label: "Icon", name: "icon", widget: "select", options: ["Shield", "Leaf", "Users", "BarChart", "Stethoscope", "Award", "FileCheck", "TrendingUp", "ClipboardList", "Globe"], i18n: false }
      - { label: "Short Description", name: "short_description", widget: "text", i18n: true }
      - { label: "Full Description", name: "body", widget: "markdown", i18n: true }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Order", name: "order", widget: "number", default: 0 }
