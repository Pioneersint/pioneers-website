[build]
  publish = "dist/public"
  functions = "netlify/functions"
  command = "echo 'Using pre-built dist/public. Functions bundled automatically.'"

[build.environment]
  NODE_VERSION = "20"

# API endpoints rewritten to Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
